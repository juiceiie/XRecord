name: XRecord
options:
  bundleIdPrefix: com.xrecord
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: XRecord
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    ENABLE_HARDENED_RUNTIME: YES

targets:
  XRecord:
    type: application
    platform: macOS
    sources:
      - path: XRecord
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: XRecord/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_PREVIEWS: YES
    entitlements:
      path: XRecord/Resources/XRecord.entitlements
      properties:
        com.apple.security.app-sandbox: false
